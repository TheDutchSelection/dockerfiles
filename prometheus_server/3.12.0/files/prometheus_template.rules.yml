groups:
- name: prometheus.rules
  rules:
  - alert: NodeDown
    expr: up == 0
    for: 1m
    labels:
      severity: page
    annotations:
      description: '{{$labels.node}} has been down for more than 1 minute.'
      summary: Node {{$labels.node}} down
  - alert: NodeLowMemory
    expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100) < 5
    for: 2m
    labels:
      severity: page
    annotations:
      description: '{{$labels.node}} has less than 5% memory available for more than
        2 minutes.'
      summary: Node {{$labels.node}} memory low
  - alert: NodeLowDisk
    expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}
      * 100) < 10
    for: 2m
    labels:
      severity: page
    annotations:
      description: '{{$labels.node}} has less than 10% free disk space available for
        more than 2 minutes.'
      summary: Node {{$labels.node}} disk space low
  - alert: HighLoad
    expr: node_load1 > 20
    for: 1m
    labels:
      severity: page
    annotations:
      description: '{{$labels.node}} has a load of over 20 for more than 2 minutes.'
      summary: Node {{$labels.node}} high load
  - alert: EndpointUnavailable
    expr: probe_success == 0
    for: 2m
    labels:
      severity: page
    annotations:
      description: Endpoint {{$labels.target_name}} has been unavailable for more
        than 2 minutes.
      summary: Endpoint {{$labels.target_name}} unavailable
  - alert: CertificateExpiringSoon
    expr: probe_ssl_earliest_cert_expiry > 0 and (probe_ssl_earliest_cert_expiry -
      time()) / 86400 < 21
    for: 1h
    labels:
      severity: warning
    annotations:
      description: TLS certificate for {{$labels.target_name}} expires in {{ printf
        "%.1f" $value }} days.
      summary: Certificate {{$labels.target_name}} expiring soon
  - alert: CertificateExpiringCritical
    expr: probe_ssl_earliest_cert_expiry > 0 and (probe_ssl_earliest_cert_expiry -
      time()) / 86400 < 7
    for: 1h
    labels:
      severity: page
    annotations:
      description: TLS certificate for {{$labels.target_name}} expires in {{ printf
        "%.1f" $value }} days — renew now.
      summary: Certificate {{$labels.target_name}} expiring critically soon
